services:
  - type: web
    name: cryptoguard-backend
    env: node
    buildCommand: npm install && pip3 install cryptography
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: darkmode_pqc
      - key: ADMIN_TOKEN
        sync: false
      - key: PORT
        value: 4000
      - key: PYTHON_BIN
        value: python3