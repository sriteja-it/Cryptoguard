# Render deployment configuration
# Docs: https://render.com/docs/render-yaml-spec

services:
  # ── Backend (Node.js Web Service) ──────────────────────────────────────
  - type: web
    name: cryptoguard-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && pip install -r requirements.txt
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: MONGODB_DB_NAME
        value: darkmode_pqc
      - key: ADMIN_TOKEN
        sync: false          # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false          # Set to your Render frontend URL after first deploy

  # ── Frontend (Static Site) ─────────────────────────────────────────────
  - type: web
    name: cryptoguard-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # Redirect all paths to index.html so React Router works
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your backend URL after first deploy
